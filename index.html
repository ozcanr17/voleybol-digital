<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voleybol Taktik Tahtası</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 10px;
            height: 100vh; 
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            overflow: hidden;
            touch-action: none; 
            user-select: none;
        }

        h3 { color: #333; margin: 5px 0 15px 0; text-align: center; font-size: 22px; }

        /* Üst Panel */
        #top-area {
            display: flex;
            width: 100%;
            max-width: 500px;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
            justify-content: center;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            width: 100%;
            justify-content: center;
        }

        button {
            padding: 8px 10px;
            font-size: 13px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #1a252f; }
        
        .phase-toggle { background-color: #e67e22; }
        .phase-toggle.active { background-color: #27ae60; }
        
        .name-btn { background-color: #8e44ad; }
        .name-btn:hover { background-color: #732d91; }

        .add-btn { background-color: #34495e; }
        .add-btn:hover { background-color: #2c3e50; }

        /* Ana Alan */
        #main-area {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            flex-grow: 1;
            align-items: center;
            justify-content: flex-start;
        }

        /* Saha */
        #court-container {
            width: 100%;
            max-width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #3e74c9;
            padding: 4px; 
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            max-height: 55vh; 
        }

        #court {
            width: 100%;
            height: 100%;
            background-color: #f47a42;
            position: relative;
            border: 2px solid white;
            box-sizing: border-box;
        }

        .net-line { position: absolute; top: 0; left: 0; width: 100%; height: 5px; background-color: #333; z-index: 1; }
        .attack-line { position: absolute; top: 33.33%; left: 0; width: 100%; height: 3px; background-color: white; opacity: 0.8; }

        /* Yedek ve Butonlar Grubu */
        #bench-wrapper {
            display: flex;
            width: 100%;
            gap: 10px;
            margin-top: 15px;
            align-items: stretch;
        }

        /* Estetik Yedek Kulübesi */
        #bench-container {
            flex-grow: 1;
            min-height: 75px;
            background: #e0e4e8;
            border-radius: 8px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: flex-start;
            flex-wrap: wrap; 
            gap: 12px;
            padding: 12px 15px;
            border: 2px dashed #95a5a6;
            box-sizing: border-box;
        }

        #bench-title {
            font-size: 11px;
            font-weight: bold;
            color: #555;
            text-align: left;
            width: 75px; 
            flex-shrink: 0;
            border-right: 2px solid #bdc3c7; 
            padding-right: 12px;
            line-height: 1.3;
        }

        /* Yan Butonlar (Kaydet & Sıfırla) */
        #side-buttons {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 35px;
        }

        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 35px;
            padding: 0;
            border-radius: 6px;
            flex: 1;
        }
        .icon-btn svg { width: 18px; height: 18px; }
        
        .btn-save-icon { background-color: #27ae60; }
        .btn-save-icon:hover { background-color: #2ecc71; }
        
        .btn-delete-icon { background-color: #c0392b; }
        .btn-delete-icon:hover { background-color: #e74c3c; }

        .player {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: white;
            font-size: 9.5px;
            font-weight: bold;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: grab;
            z-index: 10;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
            line-height: 1.1;
            overflow: hidden;
            word-wrap: break-word;
            padding: 2px;
            box-sizing: border-box;
            flex-shrink: 0; 
        }

        .ball {
            width: 30px;
            height: 30px;
            background-image: url('mikasa.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: transparent;
            border-radius: 50%;
            border: none;
            cursor: grab;
            z-index: 11;
            filter: drop-shadow(0px 4px 5px rgba(0,0,0,0.5));
        }

        .role-pasor { background-color: #3498db; }
        .role-pasor-caprazi { background-color: #9b59b6; }
        .role-smacor { background-color: #e74c3c; }
        .role-orta { background-color: #2ecc71; }
        .role-libero { background-color: #f1c40f; color: #333; border-color: #333;}

        /* MODAL PENCERELERİ */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 300px;
            max-width: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .modal-box h4 { margin: 0; text-align: center; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        .modal-row { display: flex; justify-content: space-between; align-items: center; }
        .modal-row label { font-size: 12px; font-weight: bold; color: #555; width: 80px; }
        .modal-row input[type="text"], .modal-row select { flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        .modal-buttons-wrapper { display: flex; justify-content: flex-end; margin-top: 10px; gap: 10px; }

        .btn-cancel { background-color: #95a5a6; }
        .btn-cancel:hover { background-color: #7f8c8d; }
        .btn-save { background-color: #27ae60; }
        .btn-save:hover { background-color: #2ecc71; }
        
        #toast {
            position: fixed;
            bottom: 30px;
            background: #2c3e50;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 3000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h3>Voleybol Taktik Tahtası</h3>
    
    <div id="top-area">
        <div class="controls">
            <button id="rotateBtn" onclick="rotateTeam()">Döndür (Rot: 1)</button>
            <button onclick="resetPositions()">Topla</button>
            <button id="phaseBtn" class="phase-toggle" onclick="togglePhase()">Mod: Servis</button>
            <button class="name-btn" onclick="openNameModal()">İsim Ver</button>
            <button class="add-btn" onclick="openAddPlayerModal()">Oyuncu Ekle</button>
        </div>
    </div>

    <div id="main-area">
        <div id="court-container">
            <div id="court"></div>
        </div>
        
        <div id="bench-wrapper">
            <div id="bench-container">
                <div id="bench-title">YEDEK KULÜBESİ<br><span style="font-size: 8.5px; font-weight: normal; color: #7f8c8d;">(Sürükleyip Değiştir)</span></div>
            </div>
            
            <div id="side-buttons">
                <button class="icon-btn btn-save-icon" onclick="openSaveModal()" title="Kadroyu ve Dizilimi Kaydet">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                </button>
                
                <button class="icon-btn btn-delete-icon" onclick="resetNamesToDefault()" title="Her Şeyi Sıfırla">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div id="toast">✅ Kaydedildi!</div>

    <div id="saveModal" class="modal-overlay">
        <div class="modal-box">
            <h4>Kaydet Seçenekleri</h4>
            <div class="modal-row" style="justify-content: flex-start; gap: 10px; margin-bottom: 5px;">
                <input type="checkbox" id="cbSaveRoster" checked>
                <label for="cbSaveRoster" style="width: auto; cursor: pointer; font-weight: normal;">Kadroyu Kaydet (İsimler ve Roller)</label>
            </div>
            <div class="modal-row" style="justify-content: flex-start; gap: 10px; margin-bottom: 10px;">
                <input type="checkbox" id="cbSaveFormations" checked>
                <label for="cbSaveFormations" style="width: auto; cursor: pointer; font-weight: normal;">Dizilimi Kaydet (Konumlar ve Top)</label>
            </div>
            <div class="modal-buttons-wrapper">
                <button class="btn-cancel" onclick="closeModal('saveModal')">İptal</button>
                <button class="btn-save" onclick="executeSave()">Kaydet</button>
            </div>
        </div>
    </div>

    <div id="nameModal" class="modal-overlay">
        <div class="modal-box">
            <h4>Takım Kadrosu</h4>
            <div id="modal-inputs" style="max-height: 50vh; overflow-y: auto; padding-right: 5px;"></div>
            <div class="modal-buttons-wrapper">
                <button class="btn-cancel" onclick="closeModal('nameModal')">Kapat</button>
                <button class="btn-save" onclick="saveNames()">Kaydet</button>
            </div>
        </div>
    </div>

    <div id="addPlayerModal" class="modal-overlay">
        <div class="modal-box">
            <h4>Yeni Oyuncu Ekle</h4>
            <div class="modal-row">
                <label>Adı:</label>
                <input type="text" id="newPlayerName" placeholder="Örn: Ahmet">
            </div>
            <div class="modal-row">
                <label>Rolü:</label>
                <select id="newPlayerRole">
                    <option value="smacor">Smaçör</option>
                    <option value="pasor">Pasör</option>
                    <option value="orta">Orta Oyuncu</option>
                    <option value="pasor-caprazi">P. Çaprazı</option>
                    <option value="libero">Libero</option>
                </select>
            </div>
            <div class="modal-buttons-wrapper">
                <button class="btn-cancel" onclick="closeModal('addPlayerModal')">İptal</button>
                <button class="btn-save" onclick="addNewPlayer()">Ekle</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('focusout', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') {
                window.scrollTo({ top: 0, left: 0, behavior: 'instant' });
                document.body.scrollTop = 0;
                document.documentElement.scrollTop = 0;
            }
        });

        let draggedElement = null;
        let rulesActive = true;
        let ballCoords = { x: 50, y: 50 }; 
        let playerIdCounter = 8; 
        
        let currentRotation = 1; 
        let formations = {}; 

        const defaultTeam = [
            { id: 'p1', role: 'pasor', name: 'Pasör', pos: 1, loc: 'court', x: 83.3, y: 80 },
            { id: 'p2', role: 'smacor', name: 'Smaçör<br>1', pos: 2, loc: 'court', x: 83.3, y: 20 },
            { id: 'p3', role: 'orta', name: 'Orta<br>1', pos: 3, loc: 'court', x: 50.0, y: 20 },
            { id: 'p4', role: 'pasor-caprazi', name: 'P.<br>Çaprazı', pos: 4, loc: 'court', x: 16.6, y: 20 },
            { id: 'p5', role: 'smacor', name: 'Smaçör<br>2', pos: 5, loc: 'court', x: 16.6, y: 80 },
            { id: 'p6', role: 'libero', name: 'Libero', pos: 6, loc: 'court', x: 50.0, y: 80 },
            { id: 'p7', role: 'orta', name: 'Orta<br>2', pos: null, loc: 'bench', x: null, y: null }
        ];

        let team = JSON.parse(JSON.stringify(defaultTeam));
        const baseCoords = {
            1: { x: 83.3, y: 80 }, 2: { x: 83.3, y: 20 }, 3: { x: 50.0, y: 20 },
            4: { x: 16.6, y: 20 }, 5: { x: 16.6, y: 80 }, 6: { x: 50.0, y: 80 }
        };

        window.addEventListener('DOMContentLoaded', () => {
            const oldTeamData = localStorage.getItem('voleybolTeam');
            if (oldTeamData) {
                localStorage.setItem('voleybolRoster', oldTeamData);
                localStorage.removeItem('voleybolTeam');
            }

            const savedRoster = localStorage.getItem('voleybolRoster');
            const savedFormations = localStorage.getItem('voleybolFormations');
            
            if (savedRoster) {
                try {
                    const parsedRoster = JSON.parse(savedRoster);
                    let maxId = 7;
                    parsedRoster.forEach(savedPlayer => {
                        let existingPlayer = team.find(p => p.id === savedPlayer.id);
                        if (existingPlayer) {
                            existingPlayer.name = savedPlayer.name;
                            existingPlayer.role = savedPlayer.role;
                        } else {
                            team.push({ 
                                id: savedPlayer.id, role: savedPlayer.role, name: savedPlayer.name, 
                                pos: null, loc: 'bench', x: null, y: null 
                            });
                        }
                        let idNum = parseInt(savedPlayer.id.substring(1));
                        if(idNum > maxId) maxId = idNum;
                    });
                    playerIdCounter = maxId + 1;
                } catch (e) { console.error(e); }
            }

            if (savedFormations) {
                try {
                    formations = JSON.parse(savedFormations);
                } catch (e) { console.error(e); }
            }

            currentRotation = 1;
            rulesActive = true;
            updateRotateButton();

            if (!applyFormation(currentRotation, rulesActive)) {
                setToBaseFormation(currentRotation);
            }
            
            renderAll();
            recordCurrentFormation(); 
        });

        // Oyuncuları bulunulan rotasyonun matematiksel nizami ilk konumlarına (Base) çeker
        function setToBaseFormation(rot) {
            team.forEach(p => {
                let idNum = parseInt(p.id.substring(1));
                if (idNum <= 6) {
                    p.loc = 'court';
                    p.pos = ((idNum - 1) - (rot - 1) + 6) % 6 + 1;
                    p.x = baseCoords[p.pos].x;
                    p.y = baseCoords[p.pos].y;
                } else {
                    p.loc = 'bench';
                    p.pos = null;
                    p.x = null;
                    p.y = null;
                }
            });
            ballCoords = { x: 50, y: 50 };
        }

        function recordCurrentFormation() {
            let key = `${currentRotation}_${rulesActive}`;
            formations[key] = {
                players: team.map(p => ({
                    id: p.id, loc: p.loc, pos: p.pos, x: p.x, y: p.y
                })),
                ball: { x: ballCoords.x, y: ballCoords.y }
            };
        }

        function applyFormation(rot, phase) {
            let key = `${rot}_${phase}`;
            if (formations[key]) {
                let savedF = formations[key];
                team.forEach(p => {
                    let f = savedF.players.find(sf => sf.id === p.id);
                    if (f) {
                        p.loc = f.loc; p.pos = f.pos; p.x = f.x; p.y = f.y;
                    } else {
                        p.loc = 'bench'; p.pos = null; p.x = null; p.y = null;
                    }
                });
                if (savedF.ball) {
                    ballCoords.x = savedF.ball.x;
                    ballCoords.y = savedF.ball.y;
                }
                return true;
            }
            return false;
        }

        function openSaveModal() {
            document.getElementById('saveModal').style.display = 'flex';
        }

        function executeSave() {
            recordCurrentFormation(); 

            const cbRoster = document.getElementById('cbSaveRoster').checked;
            const cbForms = document.getElementById('cbSaveFormations').checked;

            if (cbRoster) {
                const rosterToSave = team.map(p => ({ id: p.id, role: p.role, name: p.name }));
                localStorage.setItem('voleybolRoster', JSON.stringify(rosterToSave));
            }

            if (cbForms) {
                localStorage.setItem('voleybolFormations', JSON.stringify(formations));
            }

            closeModal('saveModal');
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        function resetNamesToDefault() {
            if(confirm("Tüm isimler, kadro ve kayıtlı taktik dizilimler tamamen sıfırlanacaktır. Emin misiniz?")) {
                team = JSON.parse(JSON.stringify(defaultTeam));
                playerIdCounter = 8;
                currentRotation = 1;
                formations = {};
                ballCoords = { x: 50, y: 50 };
                
                localStorage.removeItem('voleybolRoster'); 
                localStorage.removeItem('voleybolFormations'); 
                
                rulesActive = true;
                const phaseBtn = document.getElementById('phaseBtn');
                phaseBtn.innerText = "Mod: Servis"; 
                phaseBtn.style.backgroundColor = "#e67e22";
                
                updateRotateButton();
                renderAll();
                recordCurrentFormation();
            }
        }

        function renderAll() {
            const court = document.getElementById('court');
            const bench = document.getElementById('bench-container');
            
            court.innerHTML = '<div class="net-line"></div><div class="attack-line"></div>';
            bench.innerHTML = '<div id="bench-title">YEDEK KULÜBESİ<br><span style="font-size: 8.5px; font-weight: normal; color: #7f8c8d;">(Sürükleyip Değiştir)</span></div>';

            team.forEach(p => {
                let div = document.createElement('div');
                div.className = `player role-${p.role}`;
                div.id = p.id;
                div.innerHTML = p.name;
                
                if (p.loc === 'court') {
                    div.style.position = 'absolute';
                    div.style.left = p.x + '%';
                    div.style.top = p.y + '%';
                    div.style.transform = 'translate(-50%, -50%)';
                    court.appendChild(div);
                } else {
                    div.style.position = 'relative';
                    bench.appendChild(div);
                }
            });

            let ball = document.createElement('div');
            ball.className = 'ball';
            ball.id = 'volleyball';
            ball.style.position = 'absolute';
            ball.style.left = ballCoords.x + '%';
            ball.style.top = ballCoords.y + '%';
            ball.style.transform = 'translate(-50%, -50%)';
            court.appendChild(ball);
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function openAddPlayerModal() {
            document.getElementById('newPlayerName').value = '';
            document.getElementById('addPlayerModal').style.display = 'flex';
        }

        function addNewPlayer() {
            let nameVal = document.getElementById('newPlayerName').value.trim();
            if (nameVal === "") nameVal = "Yeni<br>Oyuncu";
            else nameVal = nameVal.replace(" ", "<br>");
            let roleVal = document.getElementById('newPlayerRole').value;
            team.push({ id: 'p' + playerIdCounter, role: roleVal, name: nameVal, pos: null, loc: 'bench', x: null, y: null });
            playerIdCounter++;
            closeModal('addPlayerModal');
            renderAll();
            recordCurrentFormation();
        }

        function openNameModal() {
            const container = document.getElementById('modal-inputs');
            container.innerHTML = ''; 
            team.forEach(p => {
                let cleanName = p.name.replace(/<br>/g, " ");
                let roleMap = { 'pasor': 'Pasör', 'smacor': 'Smaçör', 'orta': 'Orta O.', 'pasor-caprazi': 'Çapraz', 'libero': 'Libero' };
                container.innerHTML += `<div class="modal-row" style="margin-bottom:8px;"><label>${roleMap[p.role] || 'Oyuncu'}</label><input type="text" id="input-${p.id}" value="${cleanName}"></div>`;
            });
            document.getElementById('nameModal').style.display = 'flex';
        }

        function saveNames() {
            team.forEach(p => {
                let inputEl = document.getElementById(`input-${p.id}`);
                if (inputEl) {
                    let inputVal = inputEl.value.trim();
                    if (inputVal !== "") p.name = inputVal.replace(" ", "<br>");
                }
            });
            closeModal('nameModal');
            renderAll();
        }

        function togglePhase() {
            recordCurrentFormation(); 
            rulesActive = !rulesActive;
            const phaseBtn = document.getElementById('phaseBtn');
            
            if(rulesActive) { 
                phaseBtn.innerText = "Mod: Servis"; 
                phaseBtn.style.backgroundColor = "#e67e22"; 
            } else { 
                phaseBtn.innerText = "Mod: Oyun İçi"; 
                phaseBtn.style.backgroundColor = "#27ae60"; 
            }
            
            // Eğer yeni geçilen modda önceden bir kayıt YOKSA, miras almak yerine base pozisyona çek
            if (!applyFormation(currentRotation, rulesActive)) {
                setToBaseFormation(currentRotation);
            }
            renderAll();
            recordCurrentFormation();
        }

        function updateRotateButton() {
            document.getElementById('rotateBtn').innerText = `Döndür (Rot: ${currentRotation})`;
        }

        function rotateTeam() {
            recordCurrentFormation(); 
            
            currentRotation = currentRotation === 6 ? 1 : currentRotation + 1;
            updateRotateButton();
            
            // Eğer yeni rotasyon+mod ikilisinde önceden bir kayıt YOKSA base pozisyonunu hesapla
            if (!applyFormation(currentRotation, rulesActive)) {
                setToBaseFormation(currentRotation);
            }
            renderAll();
            recordCurrentFormation(); 
        }

        function resetPositions() {
            team.forEach(p => {
                if (p.loc === 'court' && p.pos !== null) { 
                    p.x = baseCoords[p.pos].x; 
                    p.y = baseCoords[p.pos].y; 
                }
            });
            ballCoords = { x: 50, y: 50 };
            renderAll();
            recordCurrentFormation();
        }

        function getBoundsForPos(posNum) {
            let bounds = { minX: 6, maxX: 94, minY: 6, maxY: 94 };
            const getP = (pos) => team.find(p => p.pos === pos && p.loc === 'court') || {x: 50, y: 50};
            const p1 = getP(1), p2 = getP(2), p3 = getP(3), p4 = getP(4), p5 = getP(5), p6 = getP(6);
            if (posNum === 1) { bounds.minY = p2.y; bounds.minX = p6.x; }
            if (posNum === 2) { bounds.maxY = p1.y; bounds.minX = p3.x; }
            if (posNum === 3) { bounds.maxY = p6.y; bounds.maxX = p2.x; bounds.minX = p4.x; }
            if (posNum === 4) { bounds.maxY = p5.y; bounds.maxX = p3.x; }
            if (posNum === 5) { bounds.minY = p4.y; bounds.maxX = p6.x; }
            if (posNum === 6) { bounds.minY = p3.y; bounds.minX = p5.x; bounds.maxX = p1.x; }
            return bounds;
        }

        function handleDragStart(e) {
            const target = e.target.closest('.player, .ball');
            if (!target) return;
            e.preventDefault();
            draggedElement = target;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            document.body.appendChild(draggedElement);
            draggedElement.style.position = 'fixed';
            draggedElement.style.zIndex = '1000';
            draggedElement.style.left = clientX + 'px';
            draggedElement.style.top = clientY + 'px';
            draggedElement.style.transform = 'translate(-50%, -50%) scale(1.15)';
        }

        function handleDragMove(e) {
            if (!draggedElement) return;
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            draggedElement.style.left = clientX + 'px';
            draggedElement.style.top = clientY + 'px';
        }

        function handleDragEnd(e) {
            if (!draggedElement) return;
            const dRect = draggedElement.getBoundingClientRect();
            const dCenter = { x: dRect.left + dRect.width/2, y: dRect.top + dRect.height/2 };
            let targetPlayer = null;
            document.querySelectorAll('#bench-container .player, #court .player').forEach(p => {
                if (p.id !== draggedElement.id) {
                    const pRect = p.getBoundingClientRect();
                    if (dCenter.x >= pRect.left && dCenter.x <= pRect.right && dCenter.y >= pRect.top && dCenter.y <= pRect.bottom) targetPlayer = p;
                }
            });
            const isBall = draggedElement.id === 'volleyball';
            const draggedId = draggedElement.id;
            let swapped = false;
            
            if (targetPlayer && !isBall) {
                let p1 = team.find(p => p.id === draggedId);
                let p2 = team.find(p => p.id === targetPlayer.id);
                if ((p1.loc === 'bench' && p2.loc === 'court') || (p1.loc === 'court' && p2.loc === 'bench')) {
                    let tempLoc = p1.loc; let tempPos = p1.pos; let tempX = p1.x; let tempY = p1.y;
                    p1.loc = p2.loc; p1.pos = p2.pos; p1.x = p2.x; p1.y = p2.y;
                    p2.loc = tempLoc; p2.pos = tempPos; p2.x = tempX; p2.y = tempY;
                    swapped = true;
                }
            } 
            
            if (!swapped) {
                const courtRect = document.getElementById('court').getBoundingClientRect();
                if (dCenter.x >= courtRect.left && dCenter.x <= courtRect.right && dCenter.y >= courtRect.top && dCenter.y <= courtRect.bottom) {
                    let xPerc = ((dCenter.x - courtRect.left) / courtRect.width) * 100;
                    let yPerc = ((dCenter.y - courtRect.top) / courtRect.height) * 100;
                    
                    if (isBall) {
                        ballCoords = { x: Math.max(0, Math.min(xPerc, 100)), y: Math.max(0, Math.min(yPerc, 100)) };
                    } else {
                        let p = team.find(p => p.id === draggedId);
                        if (p.loc === 'court') {
                            let iterations = 0; let overlapping = true; const MIN_DIST = 5.5; 
                            while(overlapping && iterations < 5) {
                                overlapping = false;
                                team.forEach(other => {
                                    if (other.id !== draggedId && other.loc === 'court') {
                                        let dx = xPerc - other.x; let dy = yPerc - other.y; let dist = Math.sqrt(dx*dx + dy*dy);
                                        if (dist < MIN_DIST) {
                                            overlapping = true; if (dist === 0) { dx = 1; dy = 0; dist = 1; }
                                            let pushDist = MIN_DIST - dist; let angle = Math.atan2(dy, dx);
                                            xPerc += Math.cos(angle) * pushDist; yPerc += Math.sin(angle) * pushDist;
                                        }
                                    }
                                });
                                iterations++;
                            }
                            if (rulesActive) { 
                                let bounds = getBoundsForPos(p.pos); 
                                xPerc = Math.max(bounds.minX, Math.min(xPerc, bounds.maxX)); 
                                yPerc = Math.max(bounds.minY, Math.min(yPerc, bounds.maxY)); 
                            } else { 
                                xPerc = Math.max(6, Math.min(xPerc, 94)); yPerc = Math.max(6, Math.min(yPerc, 94)); 
                            }
                            p.x = xPerc; p.y = yPerc;
                        }
                    }
                }
            }
            if (draggedElement.parentNode === document.body) document.body.removeChild(draggedElement);
            draggedElement = null;
            
            renderAll();
            recordCurrentFormation(); 
        }

        document.addEventListener('mousedown', handleDragStart);
        document.addEventListener('mousemove', handleDragMove);
        document.addEventListener('mouseup', handleDragEnd);
        document.addEventListener('touchstart', handleDragStart, {passive: false});
        document.addEventListener('touchmove', handleDragMove, {passive: false});
        document.addEventListener('touchend', handleDragEnd);
    </script>
</body>
