<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Voleybol Taktik Tahtası</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 10px;
            height: 100vh; 
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            overflow: hidden;
            touch-action: none; 
            user-select: none;
        }

        h3 { color: #333; margin: 5px 0 15px 0; text-align: center; font-size: 22px; }

        /* ÜST PANEL ÇERÇEVESİ VE BÖLÜMLERİ (Yedek Kulübesi İle Aynı Tema) */
        #top-controls-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            background: #e0e4e8; /* Yedek kulübesi arka planı */
            padding: 12px;
            border-radius: 8px; /* Yedek kulübesi köşe yumuşatması */
            margin-bottom: 15px;
            gap: 12px;
            box-sizing: border-box;
            border: 2px dashed #95a5a6; /* Yedek kulübesi kesikli kenarlığı */
        }

        .top-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            width: 100%;
            justify-content: center;
            padding-bottom: 12px;
            border-bottom: 2px solid #bdc3c7; /* Yedek kulübesindeki ayrım çubuğu stili */
        }

        .phase-row {
    display: flex;
    flex-wrap: wrap; /* Butonların kaymasına sebep olan kısım burası */
    gap: 6px;
    width: 100%;
    justify-content: center;
}

        /* GENEL BUTON STİLLERİ VE RENKLERİ */
        button {
            padding: 9px 12px;
            font-size: 13px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.15s ease;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            text-shadow: 0 1px 1px rgba(0,0,0,0.3);
        }

	button:active { transform: translateY(2px); box-shadow: none !important; }
			
        /* Uyumlu Üst Buton Renkleri */
        .btn-rotate { background-color: #2980b9; box-shadow: 0 3px 0 #1c5980; }
        .btn-rotate:hover { background-color: #2471a3; }

        .btn-gather { background-color: #57b497; box-shadow: 0 3px 0 #3c816c; }
        .btn-gather:hover { background-color: #55b698; }

        .btn-name { background-color: #8e44ad; box-shadow: 0 3px 0 #6c3483; }
        .btn-name:hover { background-color: #7d3c98; }

        .btn-add { background-color: #d35400; box-shadow: 0 3px 0 #a04000; }
        .btn-add:hover { background-color: #d35400; }

        /* Faz (Mod) Butonları */
        .phase-btn {
	    flex: 0 0 auto;
            padding: 8px 6px;
            font-size: 12px;
            background-color: #2c3e50;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            text-align: center;
            line-height: 1.2;
            word-wrap: break-word;
            box-shadow: 0 3px 0 #1a252f;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .phase-btn:hover { background-color: #1a252f; }
        .phase-btn.active {
            background-color: #27ae60;
            border-color: #2ecc71;
            transform: scale(1.05);
            box-shadow: 0 3px 0 #1e8449;
	    transform: translateY(2px);
            z-index: 2;
        }

        /* ANA ALAN */
        #main-area {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            flex-grow: 1;
            align-items: center;
            justify-content: flex-start;
        }

        /* SAHA */
        #court-container {
            width: 100%;
            max-width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #3e74c9;
            padding: 4px; 
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            max-height: 55vh; 
        }

        #court {
            width: 100%;
            height: 100%;
            background-color: #f47a42;
            position: relative;
            border: 2px solid white;
            box-sizing: border-box;
        }

        .net-line { position: absolute; top: 0; left: 0; width: 100%; height: 5px; background-color: #333; z-index: 1; }
        .attack-line { position: absolute; top: 33.33%; left: 0; width: 100%; height: 3px; background-color: white; opacity: 0.8; }

        /* YEDEK VE YAN BUTONLAR */
        #bench-wrapper {
            display: flex;
            width: 100%;
            gap: 10px;
            margin-top: 15px;
            align-items: stretch;
        }

        #bench-container {
            flex-grow: 1;
            min-height: 75px;
            background: #e0e4e8;
            border-radius: 8px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: flex-start;
            flex-wrap: wrap; 
            gap: 12px;
            padding: 12px 15px;
            border: 2px dashed #95a5a6;
            box-sizing: border-box;
        }

        #bench-title {
            font-size: 11px;
            font-weight: bold;
            color: #555;
            text-align: left;
            width: 75px; 
            flex-shrink: 0;
            border-right: 2px solid #bdc3c7; 
            padding-right: 12px;
            line-height: 1.3;
        }

        #side-buttons {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 35px;
        }

        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 35px;
            padding: 0;
            border-radius: 6px;
            flex: 1;
        }
        .icon-btn svg { width: 18px; height: 18px; color: white; }
        
        .btn-save-icon { background-color: #27ae60; }
        .btn-save-icon:hover { background-color: #2ecc71; }
        
        .btn-delete-icon { background-color: #c0392b; }
        .btn-delete-icon:hover { background-color: #e74c3c; }

        /* OYUNCU VE TOP SINIFLARI */
        .player {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: white;
            font-size: 9.5px;
            font-weight: bold;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: grab;
            z-index: 10;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
            line-height: 1.1;
            overflow: hidden;
            word-wrap: break-word;
            padding: 2px;
            box-sizing: border-box;
            flex-shrink: 0; 
            transition: left 0.4s cubic-bezier(0.25, 1, 0.5, 1), top 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.2s ease;
        }

        .ball {
            width: 30px;
            height: 30px;
            background-image: url('mikasa.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: transparent;
            border-radius: 50%;
            border: none;
            cursor: grab;
            z-index: 11;
            filter: drop-shadow(0px 4px 5px rgba(0,0,0,0.5));
            transition: left 0.4s cubic-bezier(0.25, 1, 0.5, 1), top 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.2s ease;
        }

        .role-pasor { background-color: #3498db; }
        .role-pasor-caprazi { background-color: #9b59b6; }
        .role-smacor { background-color: #e74c3c; }
        .role-orta { background-color: #2ecc71; }
        .role-libero { background-color: #f1c40f; color: #333; border-color: #333;}

        /* MODAL PENCERELERİ */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 300px;
            max-width: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .modal-box h4 { margin: 0; text-align: center; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        .modal-row { display: flex; justify-content: space-between; align-items: center; }
        .modal-row label { font-size: 12px; font-weight: bold; color: #555; width: 80px; }
        .modal-row input[type="text"], .modal-row select { flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        .modal-buttons-wrapper { display: flex; justify-content: flex-end; margin-top: 10px; gap: 10px; }

        .btn-cancel { background-color: #95a5a6; color: white; border: none; }
        .btn-cancel:hover { background-color: #7f8c8d; }
        .btn-save { background-color: #27ae60; color: white; border: none; }
        .btn-save:hover { background-color: #2ecc71; }
        
        #toast {
            position: fixed;
            bottom: 30px;
            background: #2c3e50;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 3000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h3>Voleybol Taktik Tahtası</h3>
    
    <!-- ÇERÇEVELİ ÜST PANEL -->
    <div id="top-controls-container">
        <!-- İŞLEV BUTONLARI ÜSTTE -->
        <div class="top-row">
            <button id="rotateBtn" class="btn-rotate" onclick="rotateTeam()">Döndür (Rot: 1)</button>
            <button class="btn-gather" onclick="resetPositions()">Topla</button>
            <button class="btn-name" onclick="openNameModal()">İsim Ver</button>
            <button class="btn-add" onclick="openAddPlayerModal()">Oyuncu Ekle</button>
        </div>
        <!-- MOD BUTONLARI ALTTA -->
        <div class="phase-row">
            <button id="btn-serve_receive" class="phase-btn active" onclick="setPhase('serve_receive')">Servis Karşılama</button>
            <button id="btn-attack" class="phase-btn" onclick="setPhase('attack')">Hücum</button>
            <button id="btn-defense" class="phase-btn" onclick="setPhase('defense')">Savunma</button>
            <button id="btn-serve" class="phase-btn" onclick="setPhase('serve')">Servis Kullanma</button>
        </div>
    </div>

    <div id="main-area">
        <div id="court-container">
            <div id="court">
                <div class="net-line"></div>
                <div class="attack-line"></div>
                <!-- Top başlangıçta sahada -->
                <div class="ball" id="volleyball"></div>
            </div>
        </div>
        
        <div id="bench-wrapper">
            <div id="bench-container">
                <div id="bench-title">YEDEK KULÜBESİ<br><span style="font-size: 8.5px; font-weight: normal; color: #7f8c8d;">(Sürükleyip Değiştir)</span></div>
            </div>
            
            <div id="side-buttons">
                <button class="icon-btn btn-save-icon" onclick="openSaveModal()" title="Kadroyu ve Dizilimi Kaydet">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                </button>
                
                <button class="icon-btn btn-delete-icon" onclick="resetNamesToDefault()" title="Her Şeyi Sıfırla">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div id="toast">✅ Kaydedildi!</div>

    <div id="saveModal" class="modal-overlay">
        <div class="modal-box">
            <h4>Kaydet Seçenekleri</h4>
            <div class="modal-row" style="justify-content: flex-start; gap: 10px; margin-bottom: 5px;">
                <input type="checkbox" id="cbSaveRoster" checked>
                <label for="cbSaveRoster" style="width: auto; cursor: pointer; font-weight: normal;">Kadroyu Kaydet (İsimler ve Roller)</label>
            </div>
            <div class="modal-row" style="justify-content: flex-start; gap: 10px; margin-bottom: 10px;">
                <input type="checkbox" id="cbSaveFormations" checked>
                <label for="cbSaveFormations" style="width: auto; cursor: pointer; font-weight: normal;">Dizilimi Kaydet (Konumlar)</label>
            </div>
            <div class="modal-buttons-wrapper">
                <button class="btn-cancel" onclick="closeModal('saveModal')">İptal</button>
                <button class="btn-save" onclick="executeSave()">Kaydet</button>
            </div>
        </div>
    </div>

    <div id="nameModal" class="modal-overlay">
        <div class="modal-box">
            <h4>Takım Kadrosu</h4>
            <div id="modal-inputs" style="max-height: 50vh; overflow-y: auto; padding-right: 5px;"></div>
            <div class="modal-buttons-wrapper">
                <button class="btn-cancel" onclick="closeModal('nameModal')">Kapat</button>
                <button class="btn-save" onclick="saveNames()">Kaydet</button>
            </div>
        </div>
    </div>

    <div id="addPlayerModal" class="modal-overlay">
        <div class="modal-box">
            <h4>Yeni Oyuncu Ekle</h4>
            <div class="modal-row">
                <label>Adı:</label>
                <input type="text" id="newPlayerName" placeholder="Örn: Ahmet">
            </div>
            <div class="modal-row">
                <label>Rolü:</label>
                <select id="newPlayerRole">
                    <option value="smacor">Smaçör</option>
                    <option value="pasor">Pasör</option>
                    <option value="orta">Orta Oyuncu</option>
                    <option value="pasor-caprazi">P. Çaprazı</option>
                    <option value="libero">Libero</option>
                </select>
            </div>
            <div class="modal-buttons-wrapper">
                <button class="btn-cancel" onclick="closeModal('addPlayerModal')">İptal</button>
                <button class="btn-save" onclick="addNewPlayer()">Ekle</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('focusout', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') {
                window.scrollTo({ top: 0, left: 0, behavior: 'instant' });
                document.body.scrollTop = 0;
                document.documentElement.scrollTop = 0;
            }
        });

        let draggedElement = null;
        
        let currentPhase = 'serve_receive'; // 'serve_receive', 'serve', 'attack', 'defense'
        let ballCoords = { x: 50, y: 50 }; 
        let playerIdCounter = 8; 
        
        let currentRotation = 1; 
        let formations = {}; 

        // Fiziksel çarpışma sınırları için % olarak yarıçaplar (500px genişlik baz alındı)
        // Oyuncu 45px -> Yarıçap 22.5px -> ~%4.5
        // Top 30px -> Yarıçap 15px -> ~%3.0
        const PLAYER_R = 4.5; 
        const BALL_R = 3.0; 

        const defaultTeam = [
            { id: 'p1', role: 'pasor', name: 'Pasör', pos: 1, loc: 'court', x: 83.3, y: 80 },
            { id: 'p2', role: 'smacor', name: 'Smaçör<br>1', pos: 2, loc: 'court', x: 83.3, y: 20 },
            { id: 'p3', role: 'orta', name: 'Orta<br>1', pos: 3, loc: 'court', x: 50.0, y: 20 },
            { id: 'p4', role: 'pasor-caprazi', name: 'P.<br>Çaprazı', pos: 4, loc: 'court', x: 16.6, y: 20 },
            { id: 'p5', role: 'smacor', name: 'Smaçör<br>2', pos: 5, loc: 'court', x: 16.6, y: 80 },
            { id: 'p6', role: 'libero', name: 'Libero', pos: 6, loc: 'court', x: 50.0, y: 80 },
            { id: 'p7', role: 'orta', name: 'Orta<br>2', pos: null, loc: 'bench', x: null, y: null }
        ];

        let team = JSON.parse(JSON.stringify(defaultTeam));
        const baseCoords = {
            1: { x: 83.3, y: 80 }, 2: { x: 83.3, y: 20 }, 3: { x: 50.0, y: 20 },
            4: { x: 16.6, y: 20 }, 5: { x: 16.6, y: 80 }, 6: { x: 50.0, y: 80 }
        };

        window.addEventListener('DOMContentLoaded', () => {
            const savedRoster = localStorage.getItem('voleybolRoster');
            const savedFormations = localStorage.getItem('voleybolFormations');
            
            if (savedRoster) {
                try {
                    const parsedRoster = JSON.parse(savedRoster);
                    let maxId = 7;
                    parsedRoster.forEach(savedPlayer => {
                        let existingPlayer = team.find(p => p.id === savedPlayer.id);
                        if (existingPlayer) {
                            existingPlayer.name = savedPlayer.name;
                            existingPlayer.role = savedPlayer.role;
                        } else {
                            team.push({ id: savedPlayer.id, role: savedPlayer.role, name: savedPlayer.name, pos: null, loc: 'bench', x: null, y: null });
                        }
                        let idNum = parseInt(savedPlayer.id.substring(1));
                        if(idNum > maxId) maxId = idNum;
                    });
                    playerIdCounter = maxId + 1;
                } catch (e) { console.error(e); }
            }

            if (savedFormations) {
                try { formations = JSON.parse(savedFormations); } 
                catch (e) { console.error(e); }
            }

            currentRotation = 1;
            currentPhase = 'serve_receive';
            updateRotateButton();

            if (!applyFormation(currentRotation, currentPhase)) {
                setToBaseFormation(currentRotation);
            }
            
            renderAll();
            recordCurrentFormation(); 
        });

        function setToBaseFormation(rot) {
            team.forEach(p => {
                let idNum = parseInt(p.id.substring(1));
                if (idNum <= 6) {
                    p.loc = 'court'; p.pos = ((idNum - 1) - (rot - 1) + 6) % 6 + 1;
                    p.x = baseCoords[p.pos].x; p.y = baseCoords[p.pos].y;
                } else {
                    p.loc = 'bench'; p.pos = null; p.x = null; p.y = null;
                }
            });
        }

        function recordCurrentFormation() {
            let key = `${currentRotation}_${currentPhase}`;
            formations[key] = { players: team.map(p => ({ id: p.id, loc: p.loc, pos: p.pos, x: p.x, y: p.y })) };
        }

        function applyFormation(rot, phase) {
            let key = `${rot}_${phase}`;
            if (formations[key]) {
                let savedF = formations[key];
                team.forEach(p => {
                    let f = savedF.players.find(sf => sf.id === p.id);
                    if (f) { p.loc = f.loc; p.pos = f.pos; p.x = f.x; p.y = f.y; } 
                    else { p.loc = 'bench'; p.pos = null; p.x = null; p.y = null; }
                });
                return true;
            }
            return false;
        }

        function openSaveModal() { document.getElementById('saveModal').style.display = 'flex'; }

        function executeSave() {
            recordCurrentFormation(); 
            const cbRoster = document.getElementById('cbSaveRoster').checked;
            const cbForms = document.getElementById('cbSaveFormations').checked;

            if (cbRoster) localStorage.setItem('voleybolRoster', JSON.stringify(team.map(p => ({ id: p.id, role: p.role, name: p.name }))));
            if (cbForms) localStorage.setItem('voleybolFormations', JSON.stringify(formations));

            closeModal('saveModal');
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        function resetNamesToDefault() {
            if(confirm("Tüm isimler, kadro ve kayıtlı taktik dizilimler tamamen sıfırlanacaktır. Emin misiniz?")) {
                team = JSON.parse(JSON.stringify(defaultTeam));
                playerIdCounter = 8; currentRotation = 1; formations = {}; ballCoords = { x: 50, y: 50 }; 
                
                localStorage.removeItem('voleybolRoster'); 
                localStorage.removeItem('voleybolFormations'); 
                
                setPhase('serve_receive'); updateRotateButton(); renderAll(); recordCurrentFormation();
            }
        }

        function renderAll() {
            const court = document.getElementById('court');
            const bench = document.getElementById('bench-container');
            
            document.querySelectorAll('.player').forEach(el => {
                if (!team.find(p => p.id === el.id)) el.remove();
            });

            team.forEach(p => {
                let el = document.getElementById(p.id);
                if (!el) { el = document.createElement('div'); el.id = p.id; }
                
                el.className = `player role-${p.role}`;
                el.innerHTML = p.name;
                
                if (p.loc === 'court') {
                    if (el.parentNode !== court) {
                        court.appendChild(el);
                        el.style.transition = 'none';
                        setTimeout(() => { el.style.transition = ''; }, 50);
                    }
                    el.style.position = 'absolute'; el.style.left = p.x + '%'; el.style.top = p.y + '%';
                    el.style.transform = 'translate(-50%, -50%)';
                } else {
                    if (el.parentNode !== bench) bench.appendChild(el);
                    el.style.position = 'relative'; el.style.left = 'auto'; el.style.top = 'auto'; el.style.transform = 'none';
                }
            });

            let ball = document.getElementById('volleyball');
            if (!ball) { ball = document.createElement('div'); ball.className = 'ball'; ball.id = 'volleyball'; }
            if (ball.parentNode !== court) {
                court.appendChild(ball);
                ball.style.transition = 'none';
                setTimeout(() => { ball.style.transition = ''; }, 50);
            }
            ball.style.position = 'absolute'; ball.style.left = ballCoords.x + '%'; ball.style.top = ballCoords.y + '%';
            ball.style.transform = 'translate(-50%, -50%)';
        }

        function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }
        function openAddPlayerModal() { document.getElementById('newPlayerName').value = ''; document.getElementById('addPlayerModal').style.display = 'flex'; }

        function addNewPlayer() {
            let nameVal = document.getElementById('newPlayerName').value.trim();
            if (nameVal === "") nameVal = "Yeni<br>Oyuncu"; else nameVal = nameVal.replace(" ", "<br>");
            team.push({ id: 'p' + playerIdCounter, role: document.getElementById('newPlayerRole').value, name: nameVal, pos: null, loc: 'bench', x: null, y: null });
            playerIdCounter++; closeModal('addPlayerModal'); renderAll(); recordCurrentFormation();
        }

        function openNameModal() {
            const container = document.getElementById('modal-inputs');
            container.innerHTML = ''; 
            team.forEach(p => {
                let roleMap = { 'pasor': 'Pasör', 'smacor': 'Smaçör', 'orta': 'Orta O.', 'pasor-caprazi': 'Çapraz', 'libero': 'Libero' };
                container.innerHTML += `<div class="modal-row" style="margin-bottom:8px;"><label>${roleMap[p.role] || 'Oyuncu'}</label><input type="text" id="input-${p.id}" value="${p.name.replace(/<br>/g, " ")}"></div>`;
            });
            document.getElementById('nameModal').style.display = 'flex';
        }

        function saveNames() {
            team.forEach(p => {
                let inputEl = document.getElementById(`input-${p.id}`);
                if (inputEl && inputEl.value.trim() !== "") p.name = inputEl.value.trim().replace(" ", "<br>");
            });
            closeModal('nameModal'); renderAll();
        }

        function setPhase(targetPhase) {
            if(currentPhase === targetPhase) return;
            recordCurrentFormation(); 
            currentPhase = targetPhase;
            
            document.querySelectorAll('.phase-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${targetPhase}`).classList.add('active');
            
            if (!applyFormation(currentRotation, currentPhase)) { setToBaseFormation(currentRotation); }
            renderAll(); recordCurrentFormation();
        }

        function updateRotateButton() { document.getElementById('rotateBtn').innerText = `Döndür (Rot: ${currentRotation})`; }

        function rotateTeam() {
            recordCurrentFormation(); 
            currentRotation = currentRotation === 6 ? 1 : currentRotation + 1;
            updateRotateButton();
            if (!applyFormation(currentRotation, currentPhase)) { setToBaseFormation(currentRotation); }
            renderAll(); recordCurrentFormation(); 
        }

        function resetPositions() {
            team.forEach(p => {
                if (p.loc === 'court' && p.pos !== null) { p.x = baseCoords[p.pos].x; p.y = baseCoords[p.pos].y; }
            });
            renderAll(); recordCurrentFormation();
        }

        function getBoundsForPos(posNum, r) {
            let bounds = { minX: r, maxX: 100 - r, minY: r, maxY: 100 - r };
            const getP = (pos) => team.find(p => p.pos === pos && p.loc === 'court') || {x: 50, y: 50};
            const p1 = getP(1), p2 = getP(2), p3 = getP(3), p4 = getP(4), p5 = getP(5), p6 = getP(6);
            if (posNum === 1) { bounds.minY = p2.y; bounds.minX = p6.x; }
            if (posNum === 2) { bounds.maxY = p1.y; bounds.minX = p3.x; }
            if (posNum === 3) { bounds.maxY = p6.y; bounds.maxX = p2.x; bounds.minX = p4.x; }
            if (posNum === 4) { bounds.maxY = p5.y; bounds.maxX = p3.x; }
            if (posNum === 5) { bounds.minY = p4.y; bounds.maxX = p6.x; }
            if (posNum === 6) { bounds.minY = p3.y; bounds.minX = p5.x; bounds.maxX = p1.x; }
            return bounds;
        }

        function handleDragStart(e) {
            const target = e.target.closest('.player, .ball');
            if (!target) return;
            e.preventDefault();
            draggedElement = target;
            draggedElement.style.transition = 'none'; 
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            document.body.appendChild(draggedElement);
            draggedElement.style.position = 'fixed';
            draggedElement.style.zIndex = '1000';
            draggedElement.style.left = clientX + 'px'; draggedElement.style.top = clientY + 'px';
            draggedElement.style.transform = 'translate(-50%, -50%) scale(1.15)';
        }

        function handleDragMove(e) {
            if (!draggedElement) return;
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            draggedElement.style.left = clientX + 'px'; draggedElement.style.top = clientY + 'px';
        }

        function handleDragEnd(e) {
            if (!draggedElement) return;
            
            if (draggedElement.parentNode === document.body) document.getElementById('court').appendChild(draggedElement);
            
            let el = draggedElement; el.style.transition = 'none';
            setTimeout(() => { el.style.transition = ''; }, 50);

            const dRect = draggedElement.getBoundingClientRect();
            const dCenter = { x: dRect.left + dRect.width/2, y: dRect.top + dRect.height/2 };
            let targetPlayer = null;
            
            document.querySelectorAll('#bench-container .player, #court .player').forEach(p => {
                if (p.id !== draggedElement.id) {
                    const pRect = p.getBoundingClientRect();
                    if (dCenter.x >= pRect.left && dCenter.x <= pRect.right && dCenter.y >= pRect.top && dCenter.y <= pRect.bottom) targetPlayer = p;
                }
            });
            
            const isBall = draggedElement.id === 'volleyball';
            const draggedId = draggedElement.id;
            let swapped = false;
            
            if (targetPlayer && !isBall) {
                let p1 = team.find(p => p.id === draggedId);
                let p2 = team.find(p => p.id === targetPlayer.id);
                if ((p1.loc === 'bench' && p2.loc === 'court') || (p1.loc === 'court' && p2.loc === 'bench')) {
                    let tempLoc = p1.loc; let tempPos = p1.pos; let tempX = p1.x; let tempY = p1.y;
                    p1.loc = p2.loc; p1.pos = p2.pos; p1.x = p2.x; p1.y = p2.y;
                    p2.loc = tempLoc; p2.pos = tempPos; p2.x = tempX; p2.y = tempY;
                    swapped = true;
                }
            } 
            
            if (!swapped) {
                const courtRect = document.getElementById('court').getBoundingClientRect();
                let xPerc = ((dCenter.x - courtRect.left) / courtRect.width) * 100;
                let yPerc = ((dCenter.y - courtRect.top) / courtRect.height) * 100;
                
                if (isBall) { ballCoords.x = xPerc; ballCoords.y = yPerc; } 
                else {
                    let p = team.find(p => p.id === draggedId);
                    if (p && p.loc === 'court') { p.x = xPerc; p.y = yPerc; }
                }

                let courtPlayers = team.filter(p => p.loc === 'court');
                let items = courtPlayers.map(p => ({ id: p.id, isBall: false, x: p.x, y: p.y, pos: p.pos }));
                items.push({ id: 'volleyball', isBall: true, x: ballCoords.x, y: ballCoords.y });

                let iterations = 0; let overlapping = true; 
                while(overlapping && iterations < 15) { 
                    overlapping = false;
                    
                    for (let i = 0; i < items.length; i++) {
                        for (let j = i + 1; j < items.length; j++) {
                            let a = items[i]; let b = items[j];
                            let dx = a.x - b.x; let dy = a.y - b.y; let dist = Math.sqrt(dx*dx + dy*dy);
                            
                            let rA = a.isBall ? BALL_R : PLAYER_R;
                            let rB = b.isBall ? BALL_R : PLAYER_R;
                            let minDist = rA + rB; 

                            if (dist < minDist) {
                                overlapping = true; if (dist === 0) { dx = 1; dy = 0; dist = 1; }
                                let overlapDist = minDist - dist;
                                let pushA = overlapDist / 2; let pushB = overlapDist / 2;
                                
                                let angle = Math.atan2(dy, dx);
                                a.x += Math.cos(angle) * pushA; a.y += Math.sin(angle) * pushA;
                                b.x -= Math.cos(angle) * pushB; b.y -= Math.sin(angle) * pushB;
                            }
                        }
                    }

                    items.forEach(item => {
                        let r = item.isBall ? BALL_R : PLAYER_R;
                        if (item.isBall) {
                            item.x = Math.max(r, Math.min(item.x, 100 - r));
                            item.y = Math.max(r, Math.min(item.y, 100 - r));
                        } else {
                            let isBounded = (currentPhase === 'serve_receive' || currentPhase === 'serve');
                            if (isBounded && item.pos !== null) { 
                                let b = getBoundsForPos(item.pos, r); 
                                item.x = Math.max(b.minX, Math.min(item.x, b.maxX)); 
                                item.y = Math.max(b.minY, Math.min(item.y, b.maxY)); 
                            } else { 
                                item.x = Math.max(r, Math.min(item.x, 100 - r));
                                item.y = Math.max(r, Math.min(item.y, 100 - r)); 
                            }
                        }
                    });
                    iterations++;
                }

                courtPlayers.forEach(p => { let it = items.find(i => i.id === p.id); p.x = it.x; p.y = it.y; });
                let bIt = items.find(i => i.id === 'volleyball');
                ballCoords.x = bIt.x; ballCoords.y = bIt.y;
            }
            draggedElement = null;
            renderAll();
            if(!isBall) { recordCurrentFormation(); } 
        }

        document.addEventListener('mousedown', handleDragStart);
        document.addEventListener('mousemove', handleDragMove);
        document.addEventListener('mouseup', handleDragEnd);
        document.addEventListener('touchstart', handleDragStart, {passive: false});
        document.addEventListener('touchmove', handleDragMove, {passive: false});
        document.addEventListener('touchend', handleDragEnd);
    </script>
</body>
</html>
